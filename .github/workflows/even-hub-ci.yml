name: Even Hub CI

on:
  push:
    branches: [main]
    paths:
      - "apps/even-hub/**"
      - "shared/schemas/**"
      - ".github/workflows/even-hub-ci.yml"
  pull_request:
    paths:
      - "apps/even-hub/**"
      - "shared/schemas/**"
      - ".github/workflows/even-hub-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: even-hub-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Tests, build, and package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/even-hub

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run unit tests
        run: npm test

      - name: Build web app
        run: npm run build

      - name: Package Even Hub app
        run: npm run pack

      - name: Upload Even Hub package
        uses: actions/upload-artifact@v4
        with:
          name: send-to-g2-even-hub
          path: |
            apps/even-hub/dist/
            apps/even-hub/*.ehpk
          if-no-files-found: error
          retention-days: 14

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: even-hub-test-report
          path: apps/even-hub/coverage/
          if-no-files-found: ignore
          retention-days: 14
