name: Android CI

on:
  push:
    branches: [main]
    paths:
      - "apps/android/**"
      - "shared/schemas/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "apps/android/**"
      - "shared/schemas/**"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Unit tests, lint, and APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/android

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Android toolchain
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          chmod +x gradlew
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Run unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Run Android lint
        run: ./gradlew --no-daemon lintDebug

      - name: Build debug APKs
        run: ./gradlew --no-daemon assembleDebug assembleDebugAndroidTest

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: send-to-g2-debug-apks
          path: |
            apps/android/app/build/outputs/apk/debug/*.apk
            apps/android/app/build/outputs/apk/androidTest/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload unit-test and lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-reports
          path: |
            apps/android/app/build/reports/tests/
            apps/android/app/build/reports/lint-results-debug.html
            apps/android/app/build/reports/lint-results-debug.xml
          if-no-files-found: warn
          retention-days: 14

  instrumentation:
    name: Instrumented tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: apps/android

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Android toolchain
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          chmod +x gradlew
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          working-directory: apps/android
          script: ./gradlew --no-daemon connectedDebugAndroidTest

      - name: Upload instrumentation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-reports
          path: |
            apps/android/app/build/reports/androidTests/
            apps/android/app/build/outputs/androidTest-results/
          if-no-files-found: warn
          retention-days: 14
